<template id="select-placeholder-option">
<option value="">{{ label }}</option>
</template>

<template id="room-empty-list">
<div class="text-center text-muted py-5">暂无房间，请创建房间或输入房间码加入。</div>
</template>

<template id="room-card-grid">
<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    {{{ cardsHtml }}}
</div>
</template>

<template id="room-card">
<div class="col">
    <div class="card save-card h-100 {{ activeClass }}" data-room-id="{{ roomId }}">
        {{{ activeHeaderHtml }}}
        <div class="card-body">
            <h5 class="card-title">{{ name }}</h5>
            <p class="card-text mb-2">
                <small class="text-muted">房间码：{{ roomCode }}</small><br>
                <small class="text-muted">剧本：{{ scenarioTitle }}</small><br>
                <small class="text-muted">成员：{{ members }}</small>
            </p>
        </div>
        <div class="card-footer bg-transparent border-0">
            <button class="btn btn-primary w-100 view-room-btn">{{ actionLabel }}</button>
        </div>
    </div>
</div>
</template>

<template id="room-active-header">
<div class="card-header bg-primary text-white text-center py-2"><small><i class="fa fa-check-circle"></i> 当前房间</small></div>
</template>

<template id="room-character-empty">
<div class="text-muted">&#26242;&#26080;&#29609;&#23478;&#35760;&#24405;</div>
</template>

<template id="room-character-binding-table">
<table class="table table-sm align-middle room-binding-table">
    <thead>
        <tr>
            <th>&#29609;&#23478;&#21517;</th>
            <th>&#32465;&#23450;&#35282;&#33394;&#21345;</th>
            <th>&#25151;&#38388;&#26435;&#38480;</th>
            <th class="text-end">&#25805;&#20316;</th>
        </tr>
    </thead>
    <tbody>{{{ rowsHtml }}}</tbody>
</table>
</template>

<template id="room-character-binding-row">
<tr class="{{ rowClass }}">
    <td>{{ username }}</td>
    <td>{{ cardName }}</td>
    <td>{{ permission }}</td>
    <td class="room-binding-actions text-end">
        {{{ changeButtonHtml }}}
        {{{ promoteButtonHtml }}}
        {{{ removeButtonHtml }}}
    </td>
</tr>
</template>

<template id="room-bind-character-button">
<button type="button" class="btn btn-sm btn-outline-primary" data-bind-user-id="{{ userId }}">&#26356;&#25913;&#35282;&#33394;&#21345;</button>
</template>

<template id="room-promote-member-button">
<button type="button" class="btn btn-sm btn-outline-secondary" data-promote-user-id="{{ userId }}">&#25552;&#26435;</button>
</template>

<template id="room-remove-member-button">
<button type="button" class="btn btn-sm btn-outline-danger" data-remove-user-id="{{ userId }}">&#21024;&#38500;&#29609;&#23478;</button>
</template>

<template id="room-record-empty">
<div class="text-muted small">暂无记录</div>
</template>

<template id="room-record-list">
<div class="list-group">{{{ recordsHtml }}}</div>
</template>

<template id="room-record-item">
<div class="list-group-item d-flex justify-content-between gap-2">
    <div>
        <div>{{ typeLabel }} {{ value }}</div>
        <small class="text-muted">{{ reason }} · {{ createdAt }}</small>
    </div>
    {{{ deleteButtonHtml }}}
</div>
</template>

<template id="room-record-delete-button">
<button type="button" class="btn btn-sm btn-outline-danger" data-record-id="{{ recordId }}">删除</button>
</template>

<template id="room-node-empty">
<div class="text-center text-muted py-3">暂无回档节点</div>
</template>

<template id="room-node-list">
<div class="list-group">{{{ nodesHtml }}}</div>
</template>

<template id="room-node-item">
<div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
    <div>
        <h6 class="mb-1">回档节点</h6>
        <small class="text-muted">创建时间：{{ createdAt }} | 消息数：{{ messageCount }}</small>
    </div>
    <div>
        <button class="btn btn-sm btn-secondary preview-node-btn me-2" data-node-filename="{{ filename }}">预览</button>
        <button class="btn btn-sm btn-primary load-node-btn me-2" data-node-filename="{{ filename }}">回档</button>
        <button class="btn btn-sm btn-danger delete-node-btn" data-node-filename="{{ filename }}">删除</button>
    </div>
</div>
</template>

<template id="room-preview-list">
<div class="preview-messages">
    {{{ messagesHtml }}}
</div>
</template>

<template id="room-preview-message">
<div class="preview-message mb-3 p-3 border rounded bg-light">
    <div class="fw-bold text-primary mb-2">{{ sender }}</div>
    <div class="markdown-body">{{ content }}</div>
</div>
</template>
