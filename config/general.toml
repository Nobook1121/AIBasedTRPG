[appearance]
theme = "light"

[language]
language = "zh-CN"

[notification]
enable_sound = true
enable_desktop_notification = false

[autosave]
enabled = true
interval = 300

[chat]
show_timestamp = true
message_font_size = 14
max_history_messages = 1000

[window]
remember_window_size = true
window_width = 1200
window_height = 800

[update]
check_update_on_startup = true
auto_update = false
